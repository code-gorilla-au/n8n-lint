name: Release

on:
  push:
    branches:
      - main

jobs:
  semantic-release:
    runs-on: ubuntu-latest
    outputs:
      new-release-published: ${{ steps.semantic.outputs.new-release-published }}
      new-release-version: ${{ steps.semantic.outputs.new-release-version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Semantic Release
        id: semantic
        uses: codfish/semantic-release-action@v4.0.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    runs-on: ubuntu-latest
    needs: semantic-release
    if: needs.semantic-release.outputs.new-release-published == 'true'
    strategy:
      matrix:
        include:
          - os: darwin
            arch: arm64
          - os: windows
            arch: amd64
          - os: linux
            arch: amd64
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'

      - name: Install Task
        uses: go-task/setup-task@v1

      - name: Build
        run: task build OS=${{ matrix.os }} ARCH=${{ matrix.arch }} VERSION=v${{ needs.semantic-release.outputs.new-release-version }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: n8n-lint-${{ matrix.os }}-${{ matrix.arch }}
          path: n8n-lint-${{ matrix.os }}-${{ matrix.arch }}*

  release:
    runs-on: ubuntu-latest
    needs: [semantic-release, build]
    if: needs.semantic-release.outputs.new-release-published == 'true'
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.semantic-release.outputs.new-release-version }}
          files: artifacts/n8n-lint-*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
